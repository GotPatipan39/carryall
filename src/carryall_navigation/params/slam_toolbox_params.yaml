# SLAM Toolbox Parameters for CarryAll AGV
# Optimized for Warehouse environments with Hand Lift kinematics

slam_toolbox:
  ros__parameters:

    # Solver settings
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function_type: None

    # Toolbox settings
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping # 'mapping' for new map, 'localization' for existing

    # Match settings
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000 
    enable_interactive_mode: true

    # Scan Matcher Settings
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 20.0  # Max LiDAR range to consider
    link_match_minimum_response_fine: 0.1  

    # Loop Closure Settings
    do_loop_closing: true
    loop_search_maximum_distance: 5.0
    loop_search_maximum_iterations: 10
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 0.5  
    loop_match_minimum_response_coarse: 0.5
    loop_match_minimum_response_fine: 0.8

    # Scan Settings
    max_laser_range: 15.0  # Adjust based on your LiDAR model
    minimum_laser_range: 0.1
    use_multi_scan_matching: false
